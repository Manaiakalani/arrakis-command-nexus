name: dune-awakening

# ---------------------------------------------------------------------------
# YAML anchors for game server command fragments
# ---------------------------------------------------------------------------
x-game-server-command:
  run: &cmd-run /workspace/scripts/run_server_safe.sh
  farm-region: &cmd-farm-region -FarmRegion=${WORLD_REGION:-North America}
  fls-token: &cmd-fls-token -ini:engine:[FuncomLiveServices]:ServiceAuthToken=${FLS_SECRET}
  fls-env: &cmd-fls-env -ini:engine:[FuncomLiveServices]:DefaultFlsEnvironment=${DUNE_FLS_ENV:-retail}
  server-name: &cmd-server-name -ini:engine:[OnlineSubsystem]:ServerName=${WORLD_UNIQUE_NAME}
  server-login-password: &cmd-server-login-password -ini:engine:[ConsoleVariables]:Bgd.ServerLoginPassword=${DUNE_SERVER_LOGIN_PASSWORD:-}
  datacenter: &cmd-datacenter -ini:engine:[OnlineSubsystem]:DatacenterId=${WORLD_DATACENTER_ID:-North America}
  db-host: &cmd-db-host -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseHost=postgres:5432
  db-user: &cmd-db-user -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseUser=dune
  db-password: &cmd-db-password -ini:game:[DuneDatabaseInterfacePSQL]:DatabasePassword=${POSTGRES_DUNE_PASSWORD}
  rmq-tls: &cmd-rmq-tls -RMQGameTlsEnabled=true
  external-address: &cmd-external-address -ExternalAddress=${EXTERNAL_ADDRESS}
  rmq-game-host: &cmd-rmq-game-host --RMQGameHostname=game-rmq
  rmq-game-port: &cmd-rmq-game-port --RMQGamePort=5672
  rmq-admin-host: &cmd-rmq-admin-host --RMQAdminHostname=admin-rmq
  rmq-admin-port: &cmd-rmq-admin-port --RMQAdminPort=5672
  # POD_IP is optional. It binds the game server to a specific NIC.
  # On single-host Docker it can be left unset (the warning is harmless).
  multihome: &cmd-multihome -MultiHome=$POD_IP

x-container-security: &container-security
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# ---------------------------------------------------------------------------
# Base template for game server containers
# ---------------------------------------------------------------------------
x-game-server-base: &game-server-base
  <<: *container-security
  image: funcom/self-hosting/seabass-server:${DUNE_IMAGE_TAG}
  dns:
    - 1.1.1.1
    - 8.8.8.8
  restart: unless-stopped
  stop_grace_period: 90s
  environment:
    DUNE_SERVER_LOGIN_PASSWORD: ${DUNE_SERVER_LOGIN_PASSWORD:-}
    DUNE_SERVER_DISPLAY_NAME: ${DUNE_SERVER_DISPLAY_NAME:-}
    WORLD_NAME: ${WORLD_NAME}
  depends_on:
    postgres:
      condition: service_healthy
    admin-rmq:
      condition: service_healthy
    game-rmq:
      condition: service_healthy
    db-init:
      condition: service_completed_successfully

# ===========================================================================
# Services
# ===========================================================================
services:

  # -------------------------------------------------------------------------
  # Postgres - world state persistence
  # -------------------------------------------------------------------------
  postgres:
    <<: *container-security
    image: igw-postgres:17.4-alpine-fc-13
    restart: unless-stopped
    environment:
      POSTGRES_DB: dune
      POSTGRES_USER: dune
      POSTGRES_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      POSTGRES_SUPER_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dune -d dune || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: ${MEM_LIMIT_POSTGRES}
    cpus: 2
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      default:
        ipv4_address: 10.80.0.2
      backend: {}

  # -------------------------------------------------------------------------
  # Admin RabbitMQ - internal coordination
  # -------------------------------------------------------------------------
  admin-rmq:
    <<: *container-security
    image: funcom/self-hosting/seabass-server-rabbitmq:${DUNE_IMAGE_TAG}
    hostname: admin-rmq
    restart: unless-stopped
    environment:
      RMQ_AUTH_BACKEND_1: cache
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET:-}
      FuncomLiveServices__RmqTlsEnabled: "false"
    ports:
      - "127.0.0.1:15672:15672"
      - "127.0.0.1:5673:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: ${MEM_LIMIT_RMQ}
    cpus: 1
    volumes:
      - ./config/rabbitmq-admin.conf:/etc/rabbitmq/conf.d/99-dune.conf:ro
      - ./config/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./data/rabbitmq/admin:/var/lib/rabbitmq
    networks:
      default:
        ipv4_address: 10.80.0.3
      backend: {}

  # -------------------------------------------------------------------------
  # Game RabbitMQ - client login and game traffic
  # -------------------------------------------------------------------------
  game-rmq:
    <<: *container-security
    image: funcom/self-hosting/seabass-server-rabbitmq:${DUNE_IMAGE_TAG}
    hostname: game-rmq
    restart: unless-stopped
    environment:
      RMQ_AUTH_BACKEND_1: cache
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET:-}
      FuncomLiveServices__RmqTlsEnabled: "true"
    ports:
      - "127.0.0.1:15673:15672"
      - "${GAME_RMQ_BIND_ADDRESS:-0.0.0.0}:${GAME_RMQ_PUBLIC_PORT:-31982}:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: ${MEM_LIMIT_RMQ}
    cpus: 1
    volumes:
      - ./config/rabbitmq-game.conf:/etc/rabbitmq/conf.d/99-dune.conf:ro
      - ./config/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./config/tls/rabbitmq/ca.crt:/etc/rabbitmq/cacert.pem:ro
      - ./config/tls/rabbitmq/server.crt:/etc/rabbitmq/cert.pem:ro
      - ./config/tls/rabbitmq/server.key:/etc/rabbitmq/key.pem:ro
      - ./data/rabbitmq/game:/var/lib/rabbitmq
    networks:
      default:
        ipv4_address: 10.80.0.4
      backend: {}

  # -------------------------------------------------------------------------
  # RMQ Auth Shim - HTTP auth backend for RabbitMQ
  # -------------------------------------------------------------------------
  rmq-auth-shim:
    <<: *container-security
    image: funcom/self-hosting/seabass-server-db-utils:${DUNE_IMAGE_TAG}
    restart: unless-stopped
    working_dir: /workspace
    environment:
      WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
      TEXT_ROUTER_AUTH_BASE: http://text-router:8080
      DUNE_RMQ_MANAGEMENT_USER: ${DUNE_RMQ_MANAGEMENT_USER:-}
      DUNE_RMQ_MANAGEMENT_PASSWORD: ${DUNE_RMQ_MANAGEMENT_PASSWORD:-}
    command:
      - /workspace/scripts/rmq_auth_shim.py
    volumes:
      - .:/workspace:ro
    depends_on:
      text-router:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      default:
        ipv4_address: 10.80.0.7
      backend: {}

  # -------------------------------------------------------------------------
  # Database Init - one-shot schema bootstrap
  # -------------------------------------------------------------------------
  db-init:
    <<: *container-security
    image: funcom/self-hosting/seabass-server-db-utils:${DUNE_IMAGE_TAG}
    restart: "no"
    working_dir: /root/PSQL
    environment:
      PYTHONPATH: /root/PSQL
      POSTGRES_DUNE_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
    command:
      - /workspace/scripts/bootstrap_db.py
    volumes:
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        ipv4_address: 10.80.0.42
      backend: {}

  # -------------------------------------------------------------------------
  # Partition Repair - fixes world_partition after server restarts
  # -------------------------------------------------------------------------
  partition-repair:
    <<: *container-security
    image: funcom/self-hosting/seabass-server-db-utils:${DUNE_IMAGE_TAG}
    restart: unless-stopped
    working_dir: /root/PSQL
    environment:
      PYTHONPATH: /root/PSQL
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: dune_sb_1_4_0_0
      DB_USER: dune
      DB_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      PARTITION_REPAIR_MAX_WAIT: "120"
      PARTITION_REPAIR_WATCH: "true"
      PARTITION_REPAIR_WATCH_INTERVAL: "10"
    command:
      - /workspace/scripts/partition_repair.py
    volumes:
      - .:/workspace:ro
    mem_limit: 128m
    cpus: 0.5
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os; os.kill(1, 0)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      default:
        ipv4_address: 10.80.0.43
      backend: {}

  # -------------------------------------------------------------------------
  # Director - battlegroup state and travel management
  # -------------------------------------------------------------------------
  director:
    <<: *container-security
    image: funcom/self-hosting/seabass-server-bg-director:${DUNE_IMAGE_TAG}
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command:
      - --RMQGameHostname
      - game-rmq
      - --RMQGamePort
      - "5672"
      - --RMQAdminHostname
      - admin-rmq
      - --RMQAdminPort
      - "5672"
    environment:
      Database__address: postgres
      Database__port: "5432"
      Database__user: dune
      Database__password: ${POSTGRES_DUNE_PASSWORD}
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET:-}
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
      OPT_SERVERNAME: ${WORLD_UNIQUE_NAME}
      OPT_DISPLAY_NAME: ${WORLD_NAME}
      FuncomLiveServices__ServiceAuthToken: ${FLS_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "true"
      BATTLEGROUP_REGION_NAME: ${WORLD_REGION:-North America}
      HOST_DATACENTER_ID: ${WORLD_DATACENTER_ID:-North America}
      HOST_DATACENTER_IP_ADDRESS: ${EXTERNAL_ADDRESS}
      FuncomLiveServices__DefaultFlsEnvironment: ${DUNE_FLS_ENV:-retail}
    mem_limit: ${MEM_LIMIT_DIRECTOR}
    cpus: 1
    volumes:
      - ./config/director.ini:/etc/app/conf.d/director.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      admin-rmq:
        condition: service_healthy
      game-rmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      default:
        ipv4_address: 10.80.0.5
      backend: {}

  # -------------------------------------------------------------------------
  # Text Router - chat routing
  # -------------------------------------------------------------------------
  text-router:
    <<: *container-security
    image: funcom/self-hosting/seabass-server-text-router:${DUNE_IMAGE_TAG}
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command:
      - --RMQGameHostname
      - game-rmq
      - --RMQGamePort
      - "5672"
      - --RMQAdminHostname
      - admin-rmq
      - --RMQAdminPort
      - "5672"
    environment:
      DuneDatabaseInterfacePSQL_DatabaseHost: postgres
      DuneDatabaseInterfacePSQL_DatabasePort: "5432"
      DuneDatabaseInterfacePSQL_DatabaseUser: dune
      DuneDatabaseInterfacePSQL_DatabasePassword: ${POSTGRES_DUNE_PASSWORD}
      DuneDatabaseInterfacePSQL_DatabaseName: dune_sb_1_4_0_0
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET:-}
      Database__address: postgres
      Database__port: "5432"
      Database__user: dune
      Database__password: ${POSTGRES_DUNE_PASSWORD}
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
      OPT_SERVERNAME: ${WORLD_UNIQUE_NAME}
      OPT_DISPLAY_NAME: ${WORLD_NAME}
      BATTLEGROUP_REGION_NAME: ${WORLD_REGION:-North America}
      FuncomLiveServices__ServiceAuthToken: ${FLS_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "true"
      BATTLEGROUP_LANGUAGE: en-US
      HOST_DATACENTER_ID: ${WORLD_DATACENTER_ID:-North America}
      HOST_DATACENTER_IP_ADDRESS: ${EXTERNAL_ADDRESS}
      FuncomLiveServices__DefaultFlsEnvironment: ${DUNE_FLS_ENV:-retail}
    mem_limit: ${MEM_LIMIT_TEXT_ROUTER}
    cpus: 1
    depends_on:
      postgres:
        condition: service_healthy
      admin-rmq:
        condition: service_healthy
      game-rmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      default:
        ipv4_address: 10.80.0.6
      backend: {}

  # -------------------------------------------------------------------------
  # Gateway - FLS farm registration
  # -------------------------------------------------------------------------
  gateway:
    <<: *container-security
    image: funcom/self-hosting/seabass-server-gateway:${DUNE_IMAGE_TAG}
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command:
      - sh
      - -lc
      - >-
        mkdir -p /etc/app/conf.d;
        printf '[OnlineSubsystem]\nServerName=%s\nDatacenterId=%s\n\n[Gateway]\ndisplay_name=%s\nProvider=self-hosted\n'
        "$$OPT_SERVERNAME" "$$HOST_DATACENTER_ID" "$$OPT_DISPLAY_NAME"
        > /etc/app/conf.d/gateway.ini;
        cat /etc/app/conf.d/gateway.ini;
        sleep 30;
        exec python -m service
        -c /Tools/Battlegroups/GatewayService/service/configs/service.conf
        --RMQGameHostname $$GAME_RMQ_PUBLIC_HOST
        --RMQGamePort $$GAME_RMQ_PUBLIC_PORT
        --RMQGameHttpPort $$GAME_RMQ_PUBLIC_HTTP_PORT
    environment:
      DuneDatabaseInterfacePSQL_DatabaseHost: postgres
      DuneDatabaseInterfacePSQL_DatabasePort: "5432"
      DuneDatabaseInterfacePSQL_DatabaseUser: dune
      DuneDatabaseInterfacePSQL_DatabasePassword: ${POSTGRES_DUNE_PASSWORD}
      DuneDatabaseInterfacePSQL_DatabaseName: dune_sb_1_4_0_0
      FuncomLiveServices__ServiceAuthToken: ${FLS_SECRET}
      FuncomLiveServices__RmqTlsEnabled: "true"
      FuncomLiveServices__BattlegroupAuthorizationPreset: BattlegroupInternal
      FuncomLiveServices__DefaultFlsEnvironment: ${DUNE_FLS_ENV:-beta}
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_NAME}
      OPT_SERVERNAME: ${WORLD_UNIQUE_NAME}
      OPT_DISPLAY_NAME: ${WORLD_NAME}
      gateway_farm_api_key: ${FLS_SECRET}
      RMQ_HTTP_TOKEN_AUTH_SECRET: ${RMQ_HTTP_TOKEN_AUTH_SECRET:-}
      HOST_DATACENTER_ID: ${WORLD_DATACENTER_ID:-North America}
      HOST_DATACENTER_IP_ADDRESS: ${EXTERNAL_ADDRESS}
      GAME_RMQ_PUBLIC_HOST: ${GAME_RMQ_PUBLIC_HOST:-${EXTERNAL_ADDRESS}}
      GAME_RMQ_PUBLIC_PORT: "${GAME_RMQ_PUBLIC_PORT:-31982}"
      GAME_RMQ_PUBLIC_HTTP_PORT: "${GAME_RMQ_PUBLIC_HTTP_PORT:-31983}"
    mem_limit: ${MEM_LIMIT_GATEWAY}
    cpus: 1
    depends_on:
      postgres:
        condition: service_healthy
      game-rmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os, signal; os.kill(1, 0)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      default:
        ipv4_address: 10.80.0.40
      backend: {}

  # -------------------------------------------------------------------------
  # Docker socket proxy - narrows dashboard access to the Docker API
  # -------------------------------------------------------------------------
  docker-socket-proxy:
    <<: *container-security
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      EXEC: 1
      IMAGES: 1
      INFO: 1
      PING: 1
      POST: 1
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
      - /tmp
    cpus: 0.5
    mem_limit: 64m
    networks:
      backend: {}

  # -------------------------------------------------------------------------
  # Dashboard API
  # -------------------------------------------------------------------------
  dashboard-api:
    <<: *container-security
    build:
      context: ./dashboard/backend
    restart: unless-stopped
    cap_drop:
      - ALL
    environment:
      DUNE_ADMIN_TOKEN: ${DUNE_ADMIN_TOKEN}
      DUNE_ADMIN_MUTATIONS_ENABLED: ${DUNE_ADMIN_MUTATIONS_ENABLED}
      DUNE_ADMIN_ALLOWED_HOSTS: ${DUNE_ADMIN_ALLOWED_HOSTS}
      DUNE_CONFIG_DIR: /workspace/config
      DUNE_METRICS_INTERVAL: "15"
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      DISCORD_NOTIFY_START: ${DISCORD_NOTIFY_START}
      DISCORD_NOTIFY_STOP: ${DISCORD_NOTIFY_STOP}
      DISCORD_NOTIFY_CRASH: ${DISCORD_NOTIFY_CRASH}
      DISCORD_NOTIFY_PLAYER_JOIN: ${DISCORD_NOTIFY_PLAYER_JOIN}
      DISCORD_NOTIFY_PLAYER_LEAVE: ${DISCORD_NOTIFY_PLAYER_LEAVE}
      BACKUP_DIR: /workspace/backups
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: dune_sb_1_4_0_0
      POSTGRES_USER: dune
      POSTGRES_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      DATABASE_URL: postgres://dune:${POSTGRES_DUNE_PASSWORD}@postgres:5432/dune_sb_1_4_0_0
      WORLD_NAME: ${WORLD_NAME}
      WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
      DUNE_RMQ_HOST: game-rmq
      DUNE_RMQ_PORT: "5672"
      DUNE_RMQ_TLS_ENABLED: "true"
      DUNE_RMQ_CA_CERT: /workspace/config/tls/rabbitmq/ca.crt
      DUNE_RMQ_MANAGEMENT_USER: ${DUNE_RMQ_MANAGEMENT_USER:-}
      DUNE_RMQ_MANAGEMENT_PASSWORD: ${DUNE_RMQ_MANAGEMENT_PASSWORD:-}
      DUNE_ANNOUNCE_ENABLED: ${DUNE_ANNOUNCE_ENABLED:-true}
      DUNE_ANNOUNCE_NAME: ${DUNE_ANNOUNCE_NAME:-Server}
      DUNE_IMAGE_TAG: ${DUNE_IMAGE_TAG}
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-basic}
      DUNE_FLS_ENV: ${DUNE_FLS_ENV:-retail}
      DUNE_DOCKER_BASE_URL: tcp://docker-socket-proxy:2375
    volumes:
      - ./config:/workspace/config:ro
      - ./backups:/workspace/backups
      - ./secrets:/workspace/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      default:
        ipv4_address: 10.80.0.50
      backend: {}
    mem_limit: 512m
    cpus: 2

  # -------------------------------------------------------------------------
  # Dashboard Frontend (Next.js with API proxy)
  # -------------------------------------------------------------------------
  dashboard-frontend:
    <<: *container-security
    build:
      context: ./dashboard/frontend
    image: dune-awakening-dashboard-frontend
    restart: unless-stopped
    cap_drop:
      - ALL
    ports:
      - "${DUNE_ADMIN_BIND_ADDRESS}:${DUNE_ADMIN_HOST_PORT}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DUNE_ADMIN_TOKEN: ${DUNE_ADMIN_TOKEN}
    depends_on:
      dashboard-api:
        condition: service_started
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      default:
        ipv4_address: 10.80.0.51
      backend: {}

# ===========================================================================
# Internal Docker bridge network (not exposed to your LAN)
# These IPs are only used for container-to-container communication.
# Change the subnet if it conflicts with your host network.
# ===========================================================================
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: ${DUNE_DOCKER_SUBNET:-10.80.0.0/20}
  backend:
    internal: true


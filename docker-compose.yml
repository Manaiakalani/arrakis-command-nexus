name: dune-awakening

x-funcom-service-base: &funcom-service-base
  image: funcom/self-hosting/seabass-server:${DUNE_IMAGE_TAG}
  restart: unless-stopped
  dns:
    - 1.1.1.1
    - 8.8.8.8
  volumes:
    - ./config:/config:ro
    - ./scripts:/workspace/scripts:ro
    - ./secrets:/run/secrets:ro

x-game-server-base: &game-server-base
  <<: *funcom-service-base
  network_mode: host
  depends_on:
    postgres:
      condition: service_healthy
    admin-rmq:
      condition: service_healthy
    game-rmq:
      condition: service_healthy
    db-init:
      condition: service_completed_successfully
  entrypoint:
    - /bin/sh
    - -lc
  command: >-
    exec /workspace/scripts/run_server_safe.sh "$${DUNE_MAP}"
    -ini:engine:[FuncomLiveServices]:ServiceAuthToken=$${FLS_SECRET}
    -ini:engine:[OnlineSubsystem]:ServerName=$${WORLD_UNIQUE_NAME}
    -ini:engine:[ConsoleVariables]:Bgd.ServerLoginPassword=$${DUNE_SERVER_LOGIN_PASSWORD}
    -ExternalAddress=$${EXTERNAL_ADDRESS}
    --RMQGameHostname=$${GAME_RMQ_HOST}
    --RMQGamePort=$${GAME_RMQ_PORT}
    --RMQAdminHostname=$${ADMIN_RMQ_HOST}
    --RMQAdminPort=$${ADMIN_RMQ_PORT}
    -Port=$${DUNE_GAME_PORT}
    -IGWPort=$${DUNE_S2S_PORT}
    -PartitionIndex=$${DUNE_PARTITION_INDEX}
  environment:
    WORLD_NAME: ${WORLD_NAME}
    WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
    BATTLEGROUP_ID: ${BATTLEGROUP_ID}
    FLS_SECRET: ${FLS_SECRET}
    FLS_SECRET_FILE: /run/secrets/funcom-token.txt
    DUNE_SERVER_LOGIN_PASSWORD: ${DUNE_SERVER_LOGIN_PASSWORD}
    EXTERNAL_ADDRESS: ${EXTERNAL_ADDRESS}
    GAME_RMQ_PUBLIC_HOST: ${GAME_RMQ_PUBLIC_HOST}
    GAME_RMQ_PUBLIC_PORT: ${GAME_RMQ_PUBLIC_PORT}
    GAME_RMQ_HOST: 127.0.0.1
    GAME_RMQ_PORT: ${GAME_RMQ_PUBLIC_PORT}
    ADMIN_RMQ_HOST: 127.0.0.1
    ADMIN_RMQ_PORT: 5672
    POSTGRES_HOST: 127.0.0.1
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: dune
    POSTGRES_USER: dune
    POSTGRES_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
    DATABASE_URL: postgres://dune:${POSTGRES_DUNE_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/dune
    CONFIG_DIR: /config
    DUNE_CONFIG_DIR: /config
    DUNE_SAVED_DIR: /home/dune/server/DuneSandbox/Saved
  volumes:
    - ./config:/config:ro
    - ./scripts:/workspace/scripts:ro
    - ./secrets:/run/secrets:ro
    - ./data/server-saved:/home/dune/server/DuneSandbox/Saved

services:
  postgres:
    image: igw-postgres:17.4-alpine-fc-13
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_SUPER_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
    ports:
      - 127.0.0.1:${POSTGRES_PORT}:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: ${MEM_LIMIT_POSTGRES}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  admin-rmq:
    image: rabbitmq:3.13-management-alpine
    hostname: admin-rmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ADMIN_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ADMIN_PASSWORD}
    ports:
      - 127.0.0.1:5672:5672
      - 127.0.0.1:15672:15672
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: ${MEM_LIMIT_RMQ}
    volumes:
      - ./config/rabbitmq-admin.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - admin-rmq-data:/var/lib/rabbitmq

  game-rmq:
    image: rabbitmq:3.13-management-alpine
    hostname: game-rmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_GAME_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_GAME_PASSWORD}
    ports:
      - ${GAME_RMQ_PUBLIC_PORT}:31982
      - 127.0.0.1:15673:15673
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: ${MEM_LIMIT_RMQ}
    volumes:
      - ./config/rabbitmq-game.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - game-rmq-data:/var/lib/rabbitmq

  rmq-auth-shim:
    <<: *funcom-service-base
    command:
      - /workspace/scripts/rmq_auth_shim.py
    environment:
      WORLD_NAME: ${WORLD_NAME}
      WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
      GAME_RMQ_HOST: game-rmq
      GAME_RMQ_PORT: "31982"
      GAME_RMQ_PUBLIC_HOST: ${GAME_RMQ_PUBLIC_HOST}
      GAME_RMQ_PUBLIC_PORT: ${GAME_RMQ_PUBLIC_PORT}
      TEXT_ROUTER_BASE_URL: http://text-router:8080
      RABBITMQ_GAME_USER: ${RABBITMQ_GAME_USER}
      RABBITMQ_GAME_PASSWORD: ${RABBITMQ_GAME_PASSWORD}
    depends_on:
      game-rmq:
        condition: service_healthy
      text-router:
        condition: service_started

  gateway:
    <<: *funcom-service-base
    command:
      - /bin/sh
      - -lc
      - >-
        sleep 15 &&
        exec python -m service
        -c /Tools/Battlegroups/GatewayService/service/configs/service.conf
        --RMQGameHostname ${GAME_RMQ_PUBLIC_HOST}
        --RMQGamePort ${GAME_RMQ_PUBLIC_PORT}
    environment:
      WORLD_NAME: ${WORLD_NAME}
      WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
      BATTLEGROUP_ID: ${BATTLEGROUP_ID}
      FLS_SECRET: ${FLS_SECRET}
      EXTERNAL_ADDRESS: ${EXTERNAL_ADDRESS}
      DUNE_CONFIG_DIR: /config
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: dune
      POSTGRES_USER: dune
      POSTGRES_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      DATABASE_URL: postgres://dune:${POSTGRES_DUNE_PASSWORD}@postgres:5432/dune
      ADMIN_RMQ_HOST: admin-rmq
      ADMIN_RMQ_PORT: "5672"
      GAME_RMQ_HOST: game-rmq
      GAME_RMQ_PORT: "31982"
      GAME_RMQ_PUBLIC_HOST: ${GAME_RMQ_PUBLIC_HOST}
      GAME_RMQ_PUBLIC_PORT: ${GAME_RMQ_PUBLIC_PORT}
    mem_limit: ${MEM_LIMIT_GATEWAY}
    volumes:
      - ./config:/config:ro
      - ./secrets:/run/secrets:ro
      - ./config/gateway.ini:/etc/app/conf.d/gateway.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      game-rmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  director:
    <<: *funcom-service-base
    command:
      - --RMQGameHostname
      - game-rmq
      - --RMQGamePort
      - "31982"
      - --RMQAdminHostname
      - admin-rmq
      - --RMQAdminPort
      - "5672"
    environment:
      WORLD_NAME: ${WORLD_NAME}
      WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
      BATTLEGROUP_ID: ${BATTLEGROUP_ID}
      FLS_SECRET: ${FLS_SECRET}
      EXTERNAL_ADDRESS: ${EXTERNAL_ADDRESS}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: dune
      POSTGRES_USER: dune
      POSTGRES_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      DATABASE_URL: postgres://dune:${POSTGRES_DUNE_PASSWORD}@postgres:5432/dune
      ADMIN_RMQ_HOST: admin-rmq
      ADMIN_RMQ_PORT: "5672"
      GAME_RMQ_HOST: game-rmq
      GAME_RMQ_PORT: "31982"
      GAME_RMQ_PUBLIC_HOST: ${GAME_RMQ_PUBLIC_HOST}
      GAME_RMQ_PUBLIC_PORT: ${GAME_RMQ_PUBLIC_PORT}
      DUNE_CONFIG_DIR: /config
    mem_limit: ${MEM_LIMIT_DIRECTOR}
    volumes:
      - ./config:/config:ro
      - ./secrets:/run/secrets:ro
      - ./config/director.ini:/etc/app/conf.d/director.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      admin-rmq:
        condition: service_healthy
      game-rmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  text-router:
    <<: *funcom-service-base
    command:
      - --RMQGameHostname
      - game-rmq
      - --RMQGamePort
      - "31982"
      - --RMQAdminHostname
      - admin-rmq
      - --RMQAdminPort
      - "5672"
    environment:
      WORLD_NAME: ${WORLD_NAME}
      WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
      BATTLEGROUP_ID: ${BATTLEGROUP_ID}
      FLS_SECRET: ${FLS_SECRET}
      EXTERNAL_ADDRESS: ${EXTERNAL_ADDRESS}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: dune
      POSTGRES_USER: dune
      POSTGRES_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      DATABASE_URL: postgres://dune:${POSTGRES_DUNE_PASSWORD}@postgres:5432/dune
      ADMIN_RMQ_HOST: admin-rmq
      ADMIN_RMQ_PORT: "5672"
      GAME_RMQ_HOST: game-rmq
      GAME_RMQ_PORT: "31982"
      GAME_RMQ_PUBLIC_HOST: ${GAME_RMQ_PUBLIC_HOST}
      GAME_RMQ_PUBLIC_PORT: ${GAME_RMQ_PUBLIC_PORT}
      DUNE_CONFIG_DIR: /config
    mem_limit: ${MEM_LIMIT_TEXT_ROUTER}
    depends_on:
      postgres:
        condition: service_healthy
      admin-rmq:
        condition: service_healthy
      game-rmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  db-init:
    image: igw-postgres:17.4-alpine-fc-13
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_SUPER_PASSWORD}
      POSTGRES_DUNE_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
    command:
      - /bin/sh
      - -ec
      - |
        until pg_isready -h postgres -U postgres -d postgres; do sleep 2; done
        psql -v ON_ERROR_STOP=1 -h postgres -U postgres -d postgres -c "DO $$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'dune') THEN CREATE ROLE dune LOGIN PASSWORD '$${POSTGRES_DUNE_PASSWORD}'; ELSE ALTER ROLE dune WITH PASSWORD '$${POSTGRES_DUNE_PASSWORD}'; END IF; END $$;"
        psql -v ON_ERROR_STOP=1 -h postgres -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'dune'" | grep -q 1 || psql -v ON_ERROR_STOP=1 -h postgres -U postgres -d postgres -c "CREATE DATABASE dune OWNER dune;"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard-api:
    build:
      context: ./dashboard/backend
    restart: unless-stopped
    environment:
      DUNE_ADMIN_TOKEN: ${DUNE_ADMIN_TOKEN}
      DUNE_ADMIN_MUTATIONS_ENABLED: ${DUNE_ADMIN_MUTATIONS_ENABLED}
      DUNE_ADMIN_ALLOWED_HOSTS: ${DUNE_ADMIN_ALLOWED_HOSTS}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      DISCORD_NOTIFY_START: ${DISCORD_NOTIFY_START}
      DISCORD_NOTIFY_STOP: ${DISCORD_NOTIFY_STOP}
      DISCORD_NOTIFY_CRASH: ${DISCORD_NOTIFY_CRASH}
      DISCORD_NOTIFY_PLAYER_JOIN: ${DISCORD_NOTIFY_PLAYER_JOIN}
      DISCORD_NOTIFY_PLAYER_LEAVE: ${DISCORD_NOTIFY_PLAYER_LEAVE}
      BACKUP_DIR: /workspace/backups
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: dune
      POSTGRES_USER: dune
      POSTGRES_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      DATABASE_URL: postgres://dune:${POSTGRES_DUNE_PASSWORD}@postgres:5432/dune
      WORLD_NAME: ${WORLD_NAME}
      WORLD_UNIQUE_NAME: ${WORLD_UNIQUE_NAME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/workspace/config:ro
      - ./backups:/workspace/backups
      - ./secrets:/workspace/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - ${DUNE_ADMIN_BIND_ADDRESS}:${DUNE_ADMIN_HOST_PORT}:80
    depends_on:
      dashboard-api:
        condition: service_started
    volumes:
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard/frontend:/usr/share/nginx/html:ro

volumes:
  postgres-data:
  admin-rmq-data:
  game-rmq-data:


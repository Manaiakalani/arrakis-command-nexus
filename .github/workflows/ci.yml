name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@9e62be81b2ac43b2ab4c004570c388a10bf0f274 # v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@670825ae02d56b614d10c4b7e771cfbc7d0deb47 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit -r dashboard/backend/requirements.txt
      - run: npm ci --prefix dashboard/frontend
      - run: npm audit --omit=dev --audit-level=high --prefix dashboard/frontend

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@670825ae02d56b614d10c4b7e771cfbc7d0deb47 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@9e62be81b2ac43b2ab4c004570c388a10bf0f274 # v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py
      - run: python -c "import ast, pathlib; [ast.parse(f.read_text()) for f in pathlib.Path('.').rglob('*.py')]"

      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ConnectionTimeout=604800.0
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:ServerDesiredSocketReceiveBufferBytes=16777216
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:ServerDesiredSocketSendBufferBytes=4194304
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ServerDesiredSocketReceiveBufferBytes=16777216
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ServerDesiredSocketSendBufferBytes=4194304
      - -ini:engine:[/Script/Engine.Engine]:NetServerMaxTickRate=120
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:NetServerMaxTickRate=120
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:MaxClientRate=2000000
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:MaxInternetClientRate=2000000
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:MaxClientRate=0
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:MaxInternetClientRate=0
      - -ini:engine:[ConsoleVariables]:t.MaxFPS=30
      - -forcelogflush
      # Sandstorm crash mitigation (SIGSEGV at 0x320 in BeginPlay)
      - -ini:engine:[ConsoleVariables]:Sandstorm.Enabled=false
      - -ini:engine:[ConsoleVariables]:Sandstorm.Treasure.Enabled=false
      - -ini:game:[/Script/DuneSandbox.SandStormConfig]:m_bAutoSpawnEnabled=false
      - -ini:game:[/Script/DuneSandbox.SandStormConfig]:m_bCoriolisAutoSpawnEnabled=false
      - -Port=7777
      - -IGWPort=7888
      - -PartitionIndex=1
    environment:
      <<: *game-env-common
      POD_IP: 10.80.0.10
      NODE_NAME: dune-node
      PARTITION_MAP_NAME: Survival_1
      GAME_PORT: 7777
    ports:
      - "7777:7777/udp"
      - "7888:7888/udp"
    volumes:

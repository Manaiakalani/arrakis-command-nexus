services:
  survival_1:
    image: funcom/self-hosting/seabass-server:${DUNE_IMAGE_TAG}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    stop_grace_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    entrypoint: ["/bin/bash", "/workspace/scripts/survival-pre-start.sh"]
    command:
      - -FarmRegion=${WORLD_REGION:-North America}
      - -ini:engine:[FuncomLiveServices]:ServiceAuthToken=${FLS_SECRET}
      - -ini:engine:[FuncomLiveServices]:DefaultFlsEnvironment=${DUNE_FLS_ENV:-retail}
      - -ini:engine:[OnlineSubsystem]:ServerName=${WORLD_UNIQUE_NAME}
      - -ini:engine:[OnlineSubsystem]:DisplayName=${WORLD_NAME}
      - -ini:engine:[ConsoleVariables]:Bgd.ServerLoginPassword=${DUNE_SERVER_LOGIN_PASSWORD:-}
      - -ini:engine:[OnlineSubsystem]:DatacenterId=${WORLD_DATACENTER_ID:-North America}
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseHost=postgres:5432
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseUser=dune
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabasePassword=${POSTGRES_DUNE_PASSWORD}
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseName=${POSTGRES_DB_NAME:-dune_sb_1_4_0_0}
      - -RMQGameTlsEnabled=true
      - -ExternalAddress=${EXTERNAL_ADDRESS}
      - --RMQGameHostname=game-rmq
      - --RMQGamePort=5672
      - --RMQAdminHostname=admin-rmq
      - --RMQAdminPort=5672
      - -MultiHome=$$POD_IP
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ConnectionTimeout=604800.0
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:ServerDesiredSocketReceiveBufferBytes=16777216
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:ServerDesiredSocketSendBufferBytes=4194304
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ServerDesiredSocketReceiveBufferBytes=16777216
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ServerDesiredSocketSendBufferBytes=4194304
      - -PartitionIndex=1
    environment:
      POD_IP: 10.80.0.10
      NODE_NAME: dune-node
      PARTITION_MAP_NAME: Survival_1
      GAME_PORT: 7777
      RESTART_COOLDOWN_SECONDS: ${RESTART_COOLDOWN_SECONDS:-15}
      PORT_AVAILABILITY_WAIT_SECONDS: ${PORT_AVAILABILITY_WAIT_SECONDS:-30}
      PARTITION_DISPLAY_NAME: ${SURVIVAL_DISPLAY_NAME:-${WORLD_NAME:-}}
      WORLD_RESET_SEED: ${SURVIVAL_RESET_SEED:-}
      POSTGRES_DUNE_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      DUNE_SERVER_LOGIN_PASSWORD: ${DUNE_SERVER_LOGIN_PASSWORD:-}
      DUNE_SERVER_DISPLAY_NAME: ${DUNE_SERVER_DISPLAY_NAME:-}
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
      # BackendLogin authentication secrets (must match director)
      DUNE_SERVER_LOGIN_PASSWORD_SECRET: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      DUNE_USERNAME_SERVER_LOGIN_SECRET: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      DUNE_LOGIN_PASSWORD_SKEW_SECONDS: ${DUNE_LOGIN_PASSWORD_SKEW_SECONDS:-300}
      ServerLoginPasswordSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      UsernameServerLoginSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      LoginPasswordSkew: ${DUNE_LOGIN_PASSWORD_SKEW_SECONDS:-300}
      BackendLoginConfiguration__ServerLoginPasswordSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      BackendLoginConfiguration__UsernameServerLoginSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      BackendLoginConfiguration__LoginPasswordSkew: ${DUNE_LOGIN_PASSWORD_SKEW_SECONDS:-300}
      BackendLoginConfiguration__Secret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      BackendLoginConfiguration__UsernameSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      BackendLoginConfiguration__ServerLoginSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      BackendLoginConfiguration__ChecksumSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      BackendLoginConfiguration__ServerLoginPasswordSecretEnvironmentVariable: DUNE_SERVER_LOGIN_PASSWORD_SECRET
      BackendLoginConfiguration__UsernameServerLoginSecretEnvironmentVariable: DUNE_USERNAME_SERVER_LOGIN_SECRET
      BackendLoginConfiguration__LoginPasswordSkewEnvironmentVariable: DUNE_LOGIN_PASSWORD_SKEW_SECONDS
      Secret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      UsernameSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      ServerLoginSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      ChecksumSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__Secret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__UsernameServerLoginSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__ServerLoginPasswordSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__LoginPasswordSkew: ${DUNE_LOGIN_PASSWORD_SKEW_SECONDS:-300}
      AuthenticationConfiguration__BackendLoginConfiguration__ServerLoginPasswordSecretEnvironmentVariable: DUNE_SERVER_LOGIN_PASSWORD_SECRET
      AuthenticationConfiguration__BackendLoginConfiguration__UsernameServerLoginSecretEnvironmentVariable: DUNE_USERNAME_SERVER_LOGIN_SECRET
      AuthenticationConfiguration__BackendLoginConfiguration__LoginPasswordSkewEnvironmentVariable: DUNE_LOGIN_PASSWORD_SKEW_SECONDS
      AuthenticationConfiguration__BackendLoginConfiguration__UsernameSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__ServerLoginSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__ChecksumSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      EXTERNAL_ADDRESS_OVERRIDE: ${EXTERNAL_ADDRESS}
      fls-apikey: ${FLS_APIKEY:-}
    mem_limit: ${MEM_LIMIT_SURVIVAL}
    memswap_limit: ${MEM_LIMIT_SURVIVAL}
    pids_limit: 512
    ports:
      - "7777:7777/udp"
      - "7888:7888/udp"
    volumes:
      - .:/workspace:ro
      - ./data/survival-saved:/home/dune/server/DuneSandbox/Saved
    depends_on:
      postgres:
        condition: service_healthy
      admin-rmq:
        condition: service_healthy
      game-rmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      default:
        ipv4_address: 10.80.0.10

  overmap:
    image: funcom/self-hosting/seabass-server:${DUNE_IMAGE_TAG}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    stop_grace_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    entrypoint: ["/bin/bash", "/workspace/scripts/survival-pre-start.sh"]
    command:
      - -FarmRegion=${WORLD_REGION:-North America}
      - -ini:engine:[FuncomLiveServices]:ServiceAuthToken=${FLS_SECRET}
      - -ini:engine:[FuncomLiveServices]:DefaultFlsEnvironment=${DUNE_FLS_ENV:-retail}
      - -ini:engine:[OnlineSubsystem]:ServerName=${WORLD_UNIQUE_NAME}
      - -ini:engine:[OnlineSubsystem]:DisplayName=${WORLD_NAME}
      - -ini:engine:[ConsoleVariables]:Bgd.ServerLoginPassword=${DUNE_SERVER_LOGIN_PASSWORD:-}
      - -ini:engine:[OnlineSubsystem]:DatacenterId=${WORLD_DATACENTER_ID:-North America}
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseHost=postgres:5432
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseUser=dune
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabasePassword=${POSTGRES_DUNE_PASSWORD}
      - -ini:game:[DuneDatabaseInterfacePSQL]:DatabaseName=${POSTGRES_DB_NAME:-dune_sb_1_4_0_0}
      - -RMQGameTlsEnabled=true
      - -ExternalAddress=${EXTERNAL_ADDRESS}
      - --RMQGameHostname=game-rmq
      - --RMQGamePort=5672
      - --RMQAdminHostname=admin-rmq
      - --RMQAdminPort=5672
      - -MultiHome=$$POD_IP
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ConnectionTimeout=604800.0
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:ServerDesiredSocketReceiveBufferBytes=16777216
      - -ini:engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:ServerDesiredSocketSendBufferBytes=4194304
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ServerDesiredSocketReceiveBufferBytes=16777216
      - -ini:engine:[/Script/InfiniteGameWorlds.IgwNetDriver]:ServerDesiredSocketSendBufferBytes=4194304
      # Force this container's startup map to the Overmap (Overland) level. UE
      # reads the map URL only from the first positional argument (right after the
      # injected "DuneSandbox" project token); a positional placed later in the
      # command is ignored and the server falls back to ServerDefaultMap. We
      # therefore override ServerDefaultMap directly, mirroring how survival_1
      # loads its default map, so the Overland partition always hosts the correct
      # level regardless of argument ordering.
      - -ini:engine:[/Script/EngineSettings.GameMapsSettings]:ServerDefaultMap=/Game/Dune/Systems/Overmap/Overmap.Overmap
      - -Port=7778
      - -IGWPort=7889
      - -PartitionIndex=2
    environment:
      POD_IP: 10.80.0.11
      RESTART_COOLDOWN_SECONDS: ${RESTART_COOLDOWN_SECONDS:-15}
      NODE_NAME: dune-node
      # Overmap = partition 2 / dimension "Overland". Despite running the Survival_1
      # UE level at runtime, world_partition labels partition 2 as 'Overmap' so the
      # FLS browser shows it as a separate entry from partition 1 (Abbir/Hagga Basin)
      # and the pre-start SKIP-LOCKED claim is unambiguous (one partition per map).
      # Keep this 'Overmap' (do NOT rename to 'Overland'): the director's PerMapConfig
      # is keyed by 'Overmap', and renaming the stored map made grants report
      # ServerState=NotAvailable. Overworld-travel resolution instead depends on
      # get_active_servers_for_gateway() reporting this server under its real partition
      # map ('Overmap') rather than the farm-level 'Survival_1' it writes to farm_state;
      # scripts/partition_repair.py (fix_gateway_function) patches that. See
      # docs/TROUBLESHOOTING.md -> "P83 on overworld travel".
      PARTITION_MAP_NAME: Overmap
      GAME_PORT: 7778
      PORT_AVAILABILITY_WAIT_SECONDS: ${PORT_AVAILABILITY_WAIT_SECONDS:-30}
      PARTITION_DISPLAY_NAME: ${OVERMAP_DISPLAY_NAME:-${WORLD_NAME:-}}
      POSTGRES_DUNE_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      DUNE_SERVER_LOGIN_PASSWORD: ${DUNE_SERVER_LOGIN_PASSWORD:-}
      DUNE_SERVER_DISPLAY_NAME: ${DUNE_SERVER_DISPLAY_NAME:-}
      BATTLEGROUP_DISPLAY_NAME: ${WORLD_UNIQUE_NAME}
      WORLD_NAME: ${WORLD_NAME}
      # BackendLogin authentication secrets (must match director)
      DUNE_SERVER_LOGIN_PASSWORD_SECRET: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      DUNE_USERNAME_SERVER_LOGIN_SECRET: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      DUNE_LOGIN_PASSWORD_SKEW_SECONDS: ${DUNE_LOGIN_PASSWORD_SKEW_SECONDS:-300}
      ServerLoginPasswordSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      UsernameServerLoginSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      LoginPasswordSkew: ${DUNE_LOGIN_PASSWORD_SKEW_SECONDS:-300}
      BackendLoginConfiguration__ServerLoginPasswordSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      BackendLoginConfiguration__UsernameServerLoginSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      BackendLoginConfiguration__LoginPasswordSkew: ${DUNE_LOGIN_PASSWORD_SKEW_SECONDS:-300}
      BackendLoginConfiguration__Secret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      BackendLoginConfiguration__UsernameSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      BackendLoginConfiguration__ServerLoginSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      BackendLoginConfiguration__ChecksumSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      BackendLoginConfiguration__ServerLoginPasswordSecretEnvironmentVariable: DUNE_SERVER_LOGIN_PASSWORD_SECRET
      BackendLoginConfiguration__UsernameServerLoginSecretEnvironmentVariable: DUNE_USERNAME_SERVER_LOGIN_SECRET
      BackendLoginConfiguration__LoginPasswordSkewEnvironmentVariable: DUNE_LOGIN_PASSWORD_SKEW_SECONDS
      Secret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      UsernameSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      ServerLoginSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      ChecksumSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__Secret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__UsernameServerLoginSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__ServerLoginPasswordSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__LoginPasswordSkew: ${DUNE_LOGIN_PASSWORD_SKEW_SECONDS:-300}
      AuthenticationConfiguration__BackendLoginConfiguration__ServerLoginPasswordSecretEnvironmentVariable: DUNE_SERVER_LOGIN_PASSWORD_SECRET
      AuthenticationConfiguration__BackendLoginConfiguration__UsernameServerLoginSecretEnvironmentVariable: DUNE_USERNAME_SERVER_LOGIN_SECRET
      AuthenticationConfiguration__BackendLoginConfiguration__LoginPasswordSkewEnvironmentVariable: DUNE_LOGIN_PASSWORD_SKEW_SECONDS
      AuthenticationConfiguration__BackendLoginConfiguration__UsernameSecret: ${DUNE_USERNAME_SERVER_LOGIN_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__ServerLoginSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      AuthenticationConfiguration__BackendLoginConfiguration__ChecksumSecret: ${DUNE_SERVER_LOGIN_PASSWORD_SECRET:-}
      EXTERNAL_ADDRESS_OVERRIDE: ${EXTERNAL_ADDRESS}
      fls-apikey: ${FLS_APIKEY:-}
    mem_limit: ${MEM_LIMIT_OVERMAP}
    memswap_limit: ${MEM_LIMIT_OVERMAP}
    pids_limit: 512
    ports:
      - "7778:7778/udp"
      - "7889:7889/udp"
    volumes:
      - .:/workspace:ro
      - ./data/server-saved/overmap:/home/dune/server/DuneSandbox/Saved
    depends_on:
      postgres:
        condition: service_healthy
      admin-rmq:
        condition: service_healthy
      game-rmq:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      default:
        ipv4_address: 10.80.0.11

  # -------------------------------------------------------------------------
  # Seed guardian - continuously pins the world reset seed so player bases are
  # never hidden by a "storm reset" seed mismatch. Defense-in-depth alongside
  # the pre-game enforcement in survival-pre-start.sh. No-op when
  # SURVIVAL_RESET_SEED is unset. Reuses the postgres image (has psql + sh).
  # -------------------------------------------------------------------------
  seed-guardian:
    image: igw-postgres:17.4-alpine-fc-13
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/workspace/scripts/seed-guard.sh"]
    environment:
      POSTGRES_DUNE_PASSWORD: ${POSTGRES_DUNE_PASSWORD}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME:-dune_sb_1_4_0_0}
      WORLD_RESET_SEED: ${SURVIVAL_RESET_SEED:-}
      SEED_GUARD_INTERVAL: ${SEED_GUARD_INTERVAL:-300}
    mem_limit: 128m
    pids_limit: 32
    cpus: 0.25
    volumes:
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        ipv4_address: 10.80.0.13

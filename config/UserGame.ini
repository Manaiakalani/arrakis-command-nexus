; Dune Awakening - Game Settings
; These settings apply to ALL servers in the battlegroup.
; Only shipped Funcom .ini keys and console variables are seeded here.
; Changes require a battlegroup restart to take effect.

; ---------------------------------------------------------------------------
; Network ports
; ---------------------------------------------------------------------------
[/Script/Seabass.SBGameState]
Port=7777
IGWPort=7888

; ---------------------------------------------------------------------------
; PvP, security zones, and player online state
; ---------------------------------------------------------------------------
[/Script/DuneSandbox.PvpPveSettings]
m_bShouldForceEnablePvpOnAllPartitions=False

[/Script/DuneSandbox.SecurityZonesSubsystem]
m_bAreSecurityZonesEnabled=True

[/Script/DuneSandbox.PlayerOnlineStateSettings]
; Bumped 300 -> 1800 (30 min) so brief network drops do not remove party state.
m_DefaultReconnectGracePeriodSeconds=1800
; Overmap specifically has a shorter grace period -- players must re-enter quickly.
m_OvermapReturnGracePeriodSeconds=90
; Grace period for instanced maps (story/dungeon instances).
m_InstancedMapReconnectGracePeriodSeconds=600

; ---------------------------------------------------------------------------
; Map FPS / Tick Rate (undocumented -- source: community research)
; Lower tick rates reduce CPU load on low-priority maps.
; ---------------------------------------------------------------------------
[/Script/DuneSandbox.MapFpsSettings]
HaggaBasin=20
Overmap=20
DeepDesert=20
HarkoVillage=10
Arrakeen=10
Overland=10

; ---------------------------------------------------------------------------
; Weather, sandworms, and hazards
; ---------------------------------------------------------------------------
[/Script/DuneSandbox.SandStormConfig]
m_bCoriolisAutoSpawnEnabled=True
m_bAutoSpawnEnabled=True

[/Script/DuneSandbox.SandwormSettings]
m_bGiantWormSystemEnabled=True
m_EnableSandwormSystem=UseAllowList
m_GiantWormMinimumPlayersOnSpiceField=1
m_GiantWormSpawningCooldown=300
m_MinDistanceBetweenSandworms=3000

[/Script/DuneSandbox.HazardsSettings]
m_VehicleQuicksandDamage=10000.0

; ---------------------------------------------------------------------------
; Building, bases, guilds, and permissions
; ---------------------------------------------------------------------------
[/Script/DuneSandbox.BuildingSettings]
m_bMitigateAllSandstormDamage=False
m_MaxNumLandclaimSegments=10
m_BaseBackupToolTimeRestrictionInSeconds=60
m_BaseBackupMaxExtensions=8
m_BuildingBlueprintMaxExtensions=4
m_bBuildingRestrictionLimitsEnabled=True

[/Script/DuneSandbox.GuildSettings]
m_MaxGuildMembersAllowed=32
m_MaxGuildsAllowed=3
m_GuildCreationCost=1000

[/Script/DuneSandbox.PermissionSettings]
m_MaxPermissionsPerActor=32

; ---------------------------------------------------------------------------
; Player rules, crafting, inventory, and economy
; ---------------------------------------------------------------------------
[/Script/DuneSandbox.TimeOfDaySettings]
m_DayLengthMinutes=30

[/Script/DuneSandbox.HydrationSubsystem]
m_bHydrationEnabled=True

[/Script/DuneSandbox.DuneSandboxGameModeBase]
m_bShouldPlayersDropLootOnDeath=False
m_bShouldPlayersLoseItemsOnDeath=False
m_bShouldNpcDropLootOnDeath=True

[/Script/DuneSandbox.CraftingSettings]
m_RepairCostWeight=0.5
m_RecyclerOutputWeight=0.25

[/Script/DuneSandbox.DuneAISettings]
m_ThreatDecayPerSecond=0.1
m_MaxReinforcementSize=150

[/Script/DuneSandbox.InventorySystemSettings]
PlayerInventoryStartingSize=40
PlayerInventoryStartingVolumeCapacity=225.0

[/DeteriorationSystem.ItemDeteriorationConstants]
UpdateRateInSeconds=1.0

[/Script/DuneSandbox.DuneExchangeSettings]
SellOrderPricePercentageFee=0.05

[/Script/DuneSandbox.AugmentSettings]
m_MinimumAugmentableItemQuality=Uncommon

[/Script/DuneSandbox.CoriolisSubsystem]
m_bIsDbWipeEnabled=False

; Console variables in UserGame.ini use Unreal's +key=value array syntax.
[ConsoleVariables]
+Dune.GlobalMiningOutputMultiplier=1.0
+Dune.GlobalVehicleMiningOutputMultiplier=1.0
+SecurityZones.PvpResourceMultiplier=2.5
+dw.VehicleDurabilityDamageMultiplier=1.0
+sandworm.dune.Enabled=1
+Vehicle.SandwormCollisionInteraction=False
+Sandstorm.Enabled=True
+Sandstorm.Treasure.Enabled=True
+Sandworm.SandwormDangerZonesEnabled=True

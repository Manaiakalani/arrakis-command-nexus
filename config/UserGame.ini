; Dune Awakening - Game Settings
; These settings apply to ALL servers in the battlegroup
; Changes require a battlegroup restart to take effect

[/Script/Seabass.SBGameMode]
; Force PvP on all partitions (False = PvE zones respected)
m_bShouldForceEnablePvpOnAllPartitions=False

; Enable security zones (safe areas near bases)
m_bAreSecurityZonesEnabled=True

; Auto-spawn Coriolis storms
m_bCoriolisAutoSpawnEnabled=False

; Reconnect grace period in seconds (0 = instant, good for Steam Deck)
m_DefaultReconnectGracePeriodSeconds=300

; Max landclaim segments per map
m_MaxNumLandclaimSegments=10

; Base backup tool time restriction (seconds, default 604800 = 7 days)
m_BaseBackupToolTimeRestrictionInSeconds=60

[/Script/Seabass.SBGameState]
; Starting port for game servers (change requires port forwarding update)
Port=7777
; Starting port for IGW traffic
IGWPort=7888

; ---------------------------------------------------------------------------
; Player Online State Settings (undocumented -- source: community research)
; ---------------------------------------------------------------------------
[/Script/DuneSandbox.PlayerOnlineStateSettings]
; How long the server waits before logging out a disconnected player (seconds)
m_DefaultReconnectGracePeriodSeconds=300
; Overmap specifically has a shorter grace period -- players must re-enter quickly
m_OvermapReturnGracePeriodSeconds=90
; Grace period for instanced maps (story/dungeon instances)
m_InstancedMapReconnectGracePeriodSeconds=300

; ---------------------------------------------------------------------------
; Map FPS / Tick Rate (undocumented -- source: community research)
; Lower tick rates reduce CPU load on low-priority maps.
; ---------------------------------------------------------------------------
[/Script/DuneSandbox.MapFpsSettings]
; Hagga Basin sietch (Survival_1) -- default 20 FPS server tick
HaggaBasin=20
; Open desert travel layer (Overmap) -- default 20 FPS
Overmap=20
; Deep desert (DeepDesert_1) -- default 20 FPS
DeepDesert=20
; Social hubs run at 10 FPS; raise to 15-20 for a smoother experience
HarkoVillage=10
Arrakeen=10
; CB_Overland_* story areas
Overland=10


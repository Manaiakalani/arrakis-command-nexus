; Dune Awakening - Director Configuration
; Controls battlegroup behavior, instancing, and player caps

[Battlegroup]
AuthorizationPreset=BattlegroupInternal

[InstancingModes]
; SingleServer = one instance, all players share it
; Dimension = multiple instances, players distributed
; ClassicalInstancing = dynamic scaling based on population
Overmap=SingleServer
Survival_1=Dimension
DeepDesert_1=ClassicalInstancing
; Social hubs and story shards each run a single shared instance backed by one
; dedicated game server in the standard/full profiles.
SH_Arrakeen=SingleServer
SH_HarkoVillage=SingleServer

[Server]
PlayerHardCap=40
ShouldUpdatePlayerCountOnFls=false
ForceLock=false
DauCap=1000000
WauCap=3360
HbsCap=1000000
; AllowGroupTravel: when a player disconnects/reconnects they land on the
; Overmap and travel back into a Survival map. With this set to false, the
; group/party is dissolved at the handoff. Set to true so parties survive
; disconnects, map travel, and Deep Desert trips.
AllowGroupTravel=true

[Survival_1]
PlayerHardCap=60
ShouldUpdatePlayerCountOnFls=true
NpeGrantDurationInMinutes=90

[DeepDesert_1]
PlayerHardCap=80
MinServers=1
NumExtraServers=0
QueueFailMap=Overmap

[Overmap]
PlayerHardCap=40

[SH_Arrakeen]
PlayerHardCap=50

[SH_HarkoVillage]
PlayerHardCap=50

[AuthenticationConfiguration]
DefaultScheme=BackendLogin
DefaultAuthenticateScheme=BackendLogin
DefaultChallengeScheme=BackendLogin
AuthenticationScheme=BackendLogin
RequireAuthenticatedSignIn=false

[ServerAuthenticationSecrets]
; These are also set via environment variables - env vars take precedence

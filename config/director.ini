; Dune Awakening - Director Configuration
; Controls battlegroup behavior, instancing, and player caps

[Battlegroup]
AuthorizationPreset=BattlegroupInternal

[InstancingModes]
; SingleServer = one instance, all players share it
; Dimension = multiple instances, players distributed
; ClassicalInstancing = dynamic scaling based on population
Overmap=SingleServer
Survival_1=Dimension
DeepDesert_1=ClassicalInstancing

[Server]
PlayerHardCap=40
ShouldUpdatePlayerCountOnFls=false
ForceLock=false
DauCap=1000000
WauCap=3360
HbsCap=1000000
AllowGroupTravel=false

[Survival_1]
PlayerHardCap=60
ShouldUpdatePlayerCountOnFls=true
NpeGrantDurationInMinutes=90

[DeepDesert_1]
PlayerHardCap=80
MinServers=0
NumExtraServers=0
QueueFailMap=Overmap

[Overmap]
PlayerHardCap=40

[AuthenticationConfiguration]
DefaultScheme=BackendLogin
DefaultAuthenticateScheme=BackendLogin
DefaultChallengeScheme=BackendLogin
AuthenticationScheme=BackendLogin
RequireAuthenticatedSignIn=false

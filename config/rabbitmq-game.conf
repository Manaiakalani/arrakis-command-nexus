# RabbitMQ Game Configuration
# All connections use TLS on port 5672 (mapped to 31982 externally)

auth_backends.1 = cache
auth_cache.cache_ttl = 600000
auth_cache.cached_backend = http

auth_http.http_method = post
auth_http.user_path = http://rmq-auth-shim:8080/v0/auth/user
auth_http.vhost_path = http://rmq-auth-shim:8080/v0/auth/vhost
auth_http.resource_path = http://rmq-auth-shim:8080/v0/auth/resource
auth_http.topic_path = http://rmq-auth-shim:8080/v0/auth/topic

listeners.tcp = none
listeners.ssl.default = 5672
ssl_options.cacertfile = /etc/rabbitmq/cacert.pem
ssl_options.certfile = /etc/rabbitmq/cert.pem
ssl_options.keyfile = /etc/rabbitmq/key.pem
ssl_options.verify = verify_none

# Suppress deprecation warnings for Funcom's legacy queue usage
deprecated_features.permit.management_metrics_collection = true
deprecated_features.permit.transient_nonexcl_queues = true

# Explicit absolute memory watermark. Containerized RMQ reports the HOST's
# total RAM (e.g. 32 GB) for its 0.4 fractional default, computing a
# watermark far above our cgroup mem_limit. The kernel then fires system
# memory alarms when RMQ approaches the cgroup boundary, blocking
# publishers and producing client P83. Set absolute to ~80% of container
# mem_limit (which defaults to 1g in .env.example). Operators using a
# smaller MEM_LIMIT_RMQ should lower this proportionally.
vm_memory_high_watermark.absolute = 800MB
vm_memory_high_watermark_paging_ratio = 0.75
disk_free_limit.absolute = 500MB

# Raise AMQP heartbeat tolerance from default 60s to 120s. This bridges
# over temporary CPU spikes during Erlang GC/metrics without severing
# game server connections (which cascades to S2S dead-peer detection).
heartbeat = 120

; Dune Awakening - Engine Settings
; Performance and network tuning

[/Script/Engine.Engine]
; Network tick rate
NetServerMaxTickRate=60

[/Script/OnlineSubsystemUtils.IpNetDriver]
; Max client rate (bytes/sec)
MaxClientRate=100000
; Max internet client rate (bytes/sec)
MaxInternetClientRate=100000

[ConsoleVariables]
; Server display name shown in the in-game experimental server browser.
; Must use Bgd. prefix - bare ServerDisplayName is ignored by the UE5 engine.
; Applied battlegroup-wide; all partitions share this name.
; Special characters like ' and | are not allowed; use straight double quotes.
; Note: this is a template default. The runtime value is overridden by the
; -ini:engine:[OnlineSubsystem]:DisplayName=${WORLD_NAME} flag passed by
; docker-compose, which reads WORLD_NAME from .env. Edit your .env, not this.
Bgd.ServerDisplayName="My Dune Awakening Server"

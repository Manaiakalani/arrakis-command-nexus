<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0f172a" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Sandworm body - sinuous S-curve -->
  <path d="M8 22 C10 18, 12 12, 16 11 C20 10, 22 14, 22 18 C22 20, 20 22, 18 21"
        fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sandworm head -->
  <circle cx="18" cy="21" r="1.8" fill="#f59e0b"/>
  <!-- Sandworm eye -->
  <circle cx="18.5" cy="20.5" r="0.6" fill="#0f172a"/>
  <!-- Spice particles -->
  <circle cx="10" cy="8" r="1" fill="url(#s)" opacity="0.7"/>
  <circle cx="24" cy="7" r="0.8" fill="url(#s)" opacity="0.5"/>
  <circle cx="7" cy="14" r="0.6" fill="url(#s)" opacity="0.4"/>
  <circle cx="26" cy="14" r="0.7" fill="url(#s)" opacity="0.6"/>
  <!-- Hexagonal command nexus icon -->
  <path d="M16 4 L20 6.3 L20 10.7 L16 13 L12 10.7 L12 6.3 Z"
        fill="none" stroke="#fde68a" stroke-width="1" opacity="0.8"/>
  <circle cx="16" cy="8.5" r="1.5" fill="#fbbf24" opacity="0.6"/>
</svg>
